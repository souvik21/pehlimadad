service: pehlimadad

frameworkVersion: '3'

plugins:
  - serverless-dotenv-plugin

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  timeout: 60
  memorySize: 512
  environment:
    TWILIO_ACCOUNT_SID: ${env:TWILIO_ACCOUNT_SID}
    TWILIO_AUTH_TOKEN: ${env:TWILIO_AUTH_TOKEN}
    TWILIO_WHATSAPP_NUMBER: ${env:TWILIO_WHATSAPP_NUMBER, 'whatsapp:+14155238886'}
    AWS_ACCOUNT_ID: !Ref AWS::AccountId
    BEDROCK_MODEL_ID: ${env:BEDROCK_MODEL_ID, 'amazon.nova-pro-v1:0'}
    DYNAMODB_TABLE: ${env:DYNAMODB_TABLE, 'pehlimadad-sessions'}
    S3_BUCKET: ${env:S3_BUCKET, 'pehlimadad-audio-467137831192'}
    GOOGLE_MAPS_API_KEY: ${env:GOOGLE_MAPS_API_KEY, ''}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - bedrock:InvokeModelWithResponseStream
          Resource: "*"
        - Effect: Allow
          Action:
            - transcribe:StartTranscriptionJob
            - transcribe:GetTranscriptionJob
          Resource: "*"
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - !GetAtt SessionsTable.Arn
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - "arn:aws:s3:::pehlimadad-audio-467137831192/*"
        - Effect: Allow
          Action:
            - polly:SynthesizeSpeech
          Resource: "*"
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:pehlimadad-dev-processor"

functions:
  webhook:
    handler: src/handler.webhook
    timeout: 10
    environment:
      PROCESSOR_FUNCTION_NAME: pehlimadad-dev-processor
    events:
      - httpApi:
          path: /webhook
          method: POST
    description: Receives Twilio webhook, fires processor async

  processor:
    handler: src/processor.process
    timeout: 120
    description: Async handler — transcribe, triage, Polly, send response

  locate:
    handler: src/locate.handler
    timeout: 29
    events:
      - httpApi:
          path: /locate
          method: GET
    description: Location capture fallback

resources:
  Resources:
    SessionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: pehlimadad-sessions
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: phone
            AttributeType: S
        KeySchema:
          - AttributeName: phone
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    AudioBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: pehlimadad-audio-467137831192
        LifecycleConfiguration:
          Rules:
            - Id: DeleteTempAudio
              Status: Enabled
              ExpirationInDays: 1

  Outputs:
    WebhookUrl:
      Description: Twilio webhook URL - set this in Twilio console
      Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/webhook"
    ApiBaseUrl:
      Description: Set this as API_BASE_URL env var for the locate link to work
      Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
